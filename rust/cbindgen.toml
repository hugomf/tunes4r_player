# cbindgen configuration for tunes4r FFI header generation
# Run: cargo build --features rustls-platform-verifier && cbindgen -c cbindgen.toml -o include/tunes4r.h

language = "C"
header = """/* Autogenerated by cbindgen - DO NOT EDIT */
/* 
 * Tunes4R FFI Header
 * 
 * This header exposes C-compatible functions from the Rust audio engine.
 * Use with FFI bindings in Dart/Flutter via dart:ffi.
 */

"""
includes = ["<stdint.h>", "<stdbool.h>", "<stddef.h>"]

# Global configuration
no_includes = false
usize_is_size_t = true

# Parse configuration
[parse]
parse_deps = true
include = []
exclude = ["tests", "benches"]

# Components to export
[export]
include = [
    "tunes4r_get_platform_verifier",
    "tunes4r_free_platform_verifier", 
    "tunes4r_platform_verifier_available",
    "tunes4r_init_android_verifier",
    "audio_engine_create",
    "audio_engine_destroy",
    "audio_engine_pause",
    "audio_engine_resume",
    "audio_engine_stop",
    "audio_engine_seek",
    "audio_engine_skip_forward",
    "audio_engine_skip_backward",
    "audio_engine_set_volume",
    "audio_engine_get_volume",
    "audio_engine_get_state",
    "audio_engine_get_position",
    "audio_engine_is_playing",
    "audio_engine_analyze_spectrum",
    "audio_engine_get_spectrum",
    "spectrum_data_free",
    "audio_engine_get_error",
    "rust_string_free",
]
exclude = []

# Type definitions
[typedef]
include = []
# Treat these Rust types as C types
force_native_aliases = true

# Rename rules
[rename]
# Keep the Rust names as-is for exported functions

[defines]
# Add defines for feature flags
add_feature = ["rustls_platform_verifier = \"1\""]
